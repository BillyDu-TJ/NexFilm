<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXFILM DESIGNER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="text-zinc-300 h-screen w-screen overflow-hidden font-sans selection:bg-zinc-700 flex flex-col" style="background-color: #121214;">
    
    <!-- Toast Container -->
    <div id="toast-container" class="fixed top-4 right-4 z-50 flex flex-col gap-2 pointer-events-none"></div>

    <!-- Header -->
    <header class="h-[50px] shrink-0 border-b border-zinc-800 flex items-center justify-between px-6 shadow-md z-20" style="background-color: #1a1a1e;">
        <div class="flex items-center gap-4">
            <button id="btn-import" class="px-5 py-1.5 text-[13px] font-medium bg-zinc-800 hover:bg-zinc-700 text-zinc-200 rounded-md transition-colors shadow-sm border border-zinc-700/50">Import Roll</button>
            <button id="btn-export-batch" class="px-5 py-1.5 text-[13px] font-medium bg-zinc-800 hover:bg-zinc-700 text-zinc-200 rounded-md transition-colors shadow-sm border border-zinc-700/50 disabled:opacity-50 disabled:cursor-not-allowed" disabled>Batch Export</button>
        </div>
        <div class="text-[13px] font-bold tracking-[0.2em] text-zinc-400">NEXFILM ENGINE v1.0</div>
        <div class="w-[200px]"></div> <!-- Spacer for balance -->
    </header>

    <div id="app" class="flex flex-1 overflow-hidden">
        
        <!-- Left Workspace -->
        <div id="workspace" class="flex-1 flex flex-col h-full overflow-hidden">
            
            <!-- Transform Tool Bar -->
            <div class="h-[40px] border-b border-zinc-800/50 flex items-center justify-center gap-4 shrink-0 z-20 shadow-sm" style="background-color: #1a1a1e;">
                <div class="flex space-x-2">
                    <button id="btn-crop-mode" class="px-4 py-1 text-[11px] font-bold text-zinc-400 hover:text-zinc-100 hover:bg-zinc-800 rounded transition-colors disabled:opacity-50 tracking-wider" disabled>CROP</button>
                    <button id="btn-rotate-mode" class="px-4 py-1 text-[11px] font-bold text-zinc-400 hover:text-zinc-100 hover:bg-zinc-800 rounded transition-colors disabled:opacity-50 tracking-wider" disabled>ROTATE</button>
                </div>
                <button id="btn-auto-crop" class="px-4 py-1 text-[11px] font-bold text-zinc-400 hover:text-zinc-100 hover:bg-zinc-800 rounded transition-colors disabled:opacity-50 tracking-wider" disabled>AUTO CROP</button>
                <div class="w-px h-4 bg-zinc-700"></div>
                <button id="btn-rotate-left" class="px-4 py-1 text-[11px] font-bold text-zinc-400 hover:text-zinc-100 hover:bg-zinc-800 rounded transition-colors disabled:opacity-50 tracking-wider" disabled>ROT L</button>
                <button id="btn-rotate-right" class="px-4 py-1 text-[11px] font-bold text-zinc-400 hover:text-zinc-100 hover:bg-zinc-800 rounded transition-colors disabled:opacity-50 tracking-wider" disabled>ROT R</button>
                <div class="w-px h-4 bg-zinc-700"></div>
                <button id="btn-flip-h" class="px-4 py-1 text-[11px] font-bold text-zinc-400 hover:text-zinc-100 hover:bg-zinc-800 rounded transition-colors disabled:opacity-50 tracking-wider" disabled>FLIP H</button>
                <button id="btn-flip-v" class="px-4 py-1 text-[11px] font-bold text-zinc-400 hover:text-zinc-100 hover:bg-zinc-800 rounded transition-colors disabled:opacity-50 tracking-wider" disabled>FLIP V</button>
            </div>

            <!-- Main Preview -->
            <div id="image-container" class="flex-1 w-full h-full p-8 flex items-center justify-center overflow-hidden bg-black shadow-inner relative">
                <div id="placeholder" class="text-zinc-600 font-medium tracking-widest text-sm uppercase">No Roll Loaded</div>
                
                <div id="canvas-wrapper" class="relative hidden" style="max-width: 100%; max-height: 100%; display: none;">
                    <!-- Dummy pusher keeps the wrapper sizing correct while preview-canvas is absolutely positioned -->
                    <canvas id="dummy-pusher" class="block" style="max-width: 100%; max-height: 100%; object-fit: contain; visibility: hidden; pointer-events: none;"></canvas>
                    <canvas id="preview-canvas" class="absolute top-0 left-0 drop-shadow-2xl rounded" style="object-fit: fill;"></canvas>
                    
                    <!-- SVG Crop Overlay -->
                    <svg id="crop-overlay" class="absolute top-0 left-0 w-full h-full pointer-events-none hidden z-10" style="overflow: visible;">
                        <path id="crop-mask" fill="rgba(0,0,0,0.6)" fill-rule="evenodd" d=""></path>
                        <rect id="crop-box" x="0" y="0" width="100%" height="100%" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="1.5" stroke-dasharray="4 4" class="pointer-events-auto cursor-move"></rect>
                        
                        <g id="crop-grid" opacity="0" class="transition-opacity duration-200 pointer-events-none">
                            <line id="grid-v1" x1="33.33%" y1="0" x2="33.33%" y2="100%" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
                            <line id="grid-v2" x1="66.66%" y1="0" x2="66.66%" y2="100%" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
                            <line id="grid-h1" x1="0" y1="33.33%" x2="100%" y2="33.33%" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
                            <line id="grid-h2" x1="0" y1="66.66%" x2="100%" y2="66.66%" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
                        </g>

                        <g id="crop-handles" class="pointer-events-auto">
                            <!-- Resize Handles -->
                            <rect class="crop-handle" data-pos="nw" x="-4" y="-4" width="8" height="8" fill="white" stroke="#18181b" stroke-width="1" style="cursor: nwse-resize;"/>
                            <rect class="crop-handle" data-pos="n" x="50%" y="-4" width="8" height="8" fill="white" stroke="#18181b" stroke-width="1" style="cursor: ns-resize;" transform="translate(-4, 0)"/>
                            <rect class="crop-handle" data-pos="ne" x="100%" y="-4" width="8" height="8" fill="white" stroke="#18181b" stroke-width="1" style="cursor: nesw-resize;" transform="translate(-4, 0)"/>
                            <rect class="crop-handle" data-pos="w" x="-4" y="50%" width="8" height="8" fill="white" stroke="#18181b" stroke-width="1" style="cursor: ew-resize;" transform="translate(0, -4)"/>
                            <rect class="crop-handle" data-pos="e" x="100%" y="50%" width="8" height="8" fill="white" stroke="#18181b" stroke-width="1" style="cursor: ew-resize;" transform="translate(-4, -4)"/>
                            <rect class="crop-handle" data-pos="sw" x="-4" y="100%" width="8" height="8" fill="white" stroke="#18181b" stroke-width="1" style="cursor: nesw-resize;" transform="translate(0, -4)"/>
                            <rect class="crop-handle" data-pos="s" x="50%" y="100%" width="8" height="8" fill="white" stroke="#18181b" stroke-width="1" style="cursor: ns-resize;" transform="translate(-4, -4)"/>
                            <rect class="crop-handle" data-pos="se" x="100%" y="100%" width="8" height="8" fill="white" stroke="#18181b" stroke-width="1" style="cursor: nwse-resize;" transform="translate(-4, -4)"/>
                        </g>
                    </svg>
                </div>
            </div>
            
            <!-- Filmstrip Carousel -->
            <div id="filmstrip-container" class="h-[140px] shrink-0 border-t border-zinc-800/50 flex items-center px-4 gap-4 overflow-x-auto custom-scrollbar" style="background-color: #1a1a1e;">
                <!-- Dynamically populated by JS -->
            </div>
        </div>
        
        <!-- Right Sidebar -->
        <div id="sidebar" class="w-[350px] h-full border-l border-zinc-800 shrink-0 flex flex-col shadow-2xl overflow-y-auto custom-scrollbar z-10" style="background-color: #1a1a1e;">
            <div class="px-6 py-5 border-b border-zinc-800/50 sticky top-0 z-10" style="background-color: #1a1a1eb3; backdrop-filter: blur(8px);">
                <h2 class="text-[11px] font-bold text-zinc-400 tracking-[0.25em] uppercase">NEXFILM CORE CONTROLS</h2>
            </div>
            
            <div class="p-6 flex flex-col gap-8">
                <!-- Mode Toggle -->
                <div class="control-group">
                    <div class="flex items-center justify-between bg-zinc-800/50 p-1 rounded-lg border border-zinc-700/50">
                        <button id="btn-mode-color" class="flex-1 text-[11px] font-bold tracking-widest uppercase py-1.5 rounded-md transition-all bg-zinc-700 text-zinc-100 shadow-sm disabled:opacity-50">COLOR</button>
                        <button id="btn-mode-bw" class="flex-1 text-[11px] font-bold tracking-widest uppercase py-1.5 rounded-md transition-all text-zinc-500 hover:text-zinc-300 disabled:opacity-50">B&W</button>
                    </div>
                </div>

                <!-- Geometry section removed -->

                <!-- Base & Density Control -->
                <div class="control-group">
                    <h3 class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest mb-4">Density Targets</h3>
                    <div class="flex flex-col gap-5">
                        <div class="slider-container">
                            <div class="flex justify-between items-center mb-2">
                                <label class="text-[12px] font-medium text-zinc-300 tracking-wide">D-Min</label>
                                <span id="val-dmin" class="text-[11px] font-mono text-zinc-400">0.100</span>
                            </div>
                            <input type="range" id="dmin" class="w-full custom-range silver-track" min="0.00" max="1.00" step="0.002" value="0.10" disabled>
                        </div>
                        <div class="slider-container">
                            <div class="flex justify-between items-center mb-2">
                                <label class="text-[12px] font-medium text-zinc-300 tracking-wide">D-Max</label>
                                <span id="val-dmax" class="text-[11px] font-mono text-zinc-400">2.000</span>
                            </div>
                            <input type="range" id="dmax" class="w-full custom-range silver-track" min="0.50" max="3.00" step="0.002" value="2.00" disabled>
                        </div>
                    </div>
                </div>

                <!-- Aesthetics -->
                <div class="control-group">
                    <h3 class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest mb-4">Aesthetics</h3>
                    <div class="flex flex-col gap-5">
                        <div class="slider-container">
                            <div class="flex justify-between items-center mb-2">
                                <label class="text-[12px] font-medium text-zinc-300 tracking-wide">Exposure</label>
                                <span id="val-exposure" class="text-[11px] font-mono text-zinc-400">0.000</span>
                            </div>
                            <input type="range" id="exposure" class="w-full custom-range silver-track" min="-3.00" max="3.00" step="0.002" value="0.00" disabled>
                        </div>
                        <div class="slider-container">
                            <div class="flex justify-between items-center mb-2">
                                <label class="text-[12px] font-medium text-zinc-300 tracking-wide">Gamma</label>
                                <span id="val-gamma" class="text-[11px] font-mono text-zinc-400">1.000</span>
                            </div>
                            <input type="range" id="gamma" class="w-full custom-range silver-track" min="0.10" max="3.00" step="0.002" value="1.00" disabled>
                        </div>
                    </div>
                </div>

                <!-- Printer Lights -->
                <div class="control-group">
                    <h3 class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest mb-4">Printer Lights (CMY)</h3>
                    <div class="flex flex-col gap-5">
                        <div class="slider-container">
                            <div class="flex justify-between items-center mb-2">
                                <label class="text-[12px] font-medium text-red-400/80 tracking-wide">Red / Cyan</label>
                                <span id="val-expr" class="text-[11px] font-mono text-zinc-400">0.000</span>
                            </div>
                            <input type="range" id="expr" class="w-full custom-range red-track" min="-1.00" max="1.00" step="0.002" value="0.00" disabled>
                        </div>
                        <div class="slider-container">
                            <div class="flex justify-between items-center mb-2">
                                <label class="text-[12px] font-medium text-emerald-400/80 tracking-wide">Green / Magenta</label>
                                <span id="val-expg" class="text-[11px] font-mono text-zinc-400">0.000</span>
                            </div>
                            <input type="range" id="expg" class="w-full custom-range green-track" min="-1.00" max="1.00" step="0.002" value="0.00" disabled>
                        </div>
                        <div class="slider-container">
                            <div class="flex justify-between items-center mb-2">
                                <label class="text-[12px] font-medium text-blue-400/80 tracking-wide">Blue / Yellow</label>
                                <span id="val-expb" class="text-[11px] font-mono text-zinc-400">0.000</span>
                            </div>
                            <input type="range" id="expb" class="w-full custom-range blue-track" min="-1.00" max="1.00" step="0.002" value="0.00" disabled>
                        </div>
                    </div>
                </div>
            </div>
            
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
